# ─────────────────────────────────────────────────────────────────────────────
# nginx/devshield.conf  —  HTTPS reverse proxy for DevShield backend
#
# FIX FOR: Critical Issue #1 — No HTTPS
#
# WHAT THIS DOES
# ──────────────
# Nginx sits in front of FastAPI and handles TLS termination.
# All traffic between the client (VS Code extension) and the server is
# encrypted with TLS.  FastAPI itself still listens on plain HTTP at
# 127.0.0.1:8000 but that port is never exposed to the internet — only
# Nginx port 443 is.
#
# HOW TO SET UP (Ubuntu/Debian server)
# ──────────────────────────────────────
# 1. Install Nginx and Certbot:
#       sudo apt install nginx certbot python3-certbot-nginx -y
#
# 2. Point your domain's A record to this server's IP.
#
# 3. Copy this file:
#       sudo cp devshield.conf /etc/nginx/sites-available/devshield
#       sudo ln -s /etc/nginx/sites-available/devshield /etc/nginx/sites-enabled/
#
# 4. Get a free TLS certificate (auto-renews every 90 days):
#       sudo certbot --nginx -d yourdomain.com
#
# 5. Certbot will edit this file automatically to add ssl_certificate paths.
#
# 6. Test and reload:
#       sudo nginx -t && sudo systemctl reload nginx
#
# HOW TO USE ON WINDOWS (local dev only)
# ────────────────────────────────────────
# For local development you do NOT need HTTPS — use plain HTTP on localhost.
# HTTPS is only required when deploying to a public server.
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    server_name yourdomain.com;

    # Let Certbot handle the ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # ── TLS certificates (filled in by Certbot) ───────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── Strong TLS settings ───────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # ── Rate limiting (basic Nginx-level protection) ──────────────────────────
    limit_req_zone $binary_remote_addr zone=devshield:10m rate=30r/m;
    limit_req zone=devshield burst=10 nodelay;

    # ── Proxy to FastAPI ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # DAST scans can take up to 10 minutes — extend timeouts
        proxy_read_timeout    620s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    620s;
    }
}
